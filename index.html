<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>人员两两组合</title>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>人员两两组合</h1>
          <p>跨字段汇总去重，补齐 C(n,2) 组合</p>
        </div>
        <span id="status">正在读取表格…</span>
      </header>

      <section>
        <h2>成员来源</h2>
        <label>来源数据表<select id="source-table"></select></label>
        <fieldset>
          <legend>成员字段（可多选）</legend>
          <div id="source-fields" class="checks"></div>
        </fieldset>
      </section>

      <section>
        <h2>写入位置</h2>
        <label>目标数据表<select id="target-table"></select></label>
        <div class="columns">
          <label>成员 A 字段<select id="left-field"></select></label>
          <label>成员 B 字段<select id="right-field"></select></label>
        </div>
      </section>

      <section class="summary">
        <strong id="summary">请选择字段后预览</strong>
        <span>只补齐缺失组合，不修改已有记录</span>
      </section>

      <footer>
        <button id="preview" class="secondary">预览</button>
        <button id="generate" disabled>生成组合</button>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
